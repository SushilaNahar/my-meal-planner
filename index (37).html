    // ── localStorage-based storage (works on GitHub Pages) ──
    window.storage = {
      get: async (key) => {
        try {
          const val = localStorage.getItem('meal_' + key);
          return val ? { key, value: val } : null;
        } catch { return null; }
      },
      set: async (key, value) => {
        try {
          localStorage.setItem('meal_' + key, value);
          return { key, value };
        } catch { return null; }
      },
      delete: async (key) => {
        try {
          localStorage.removeItem('meal_' + key);
          return { key, deleted: true };
        } catch { return null; }
      },
    };

const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function getWeekDates(weekOffset) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((day === 0 ? 7 : day) - 1) + weekOffset * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function dateKey(d) {
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function formatDate(d) {
  return `${DAY_NAMES[d.getDay()]} ${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
}

function isToday(d) {
  const t = new Date();
  return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
}

function alpha(arr) {
  return [...arr].sort((a, b) => a.name.localeCompare(b.name));
}

// ─── STORAGE HOOK ─────────────────────────────────────────────────────────────
function useStorage(key, initial) {
  const [data, setData] = useState(initial);
  const [loaded, setLoaded] = useState(false);
  const dataRef = React.useRef(data);

  useEffect(() => {
    dataRef.current = data;
  }, [data]);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(key);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          setData(parsed);
          dataRef.current = parsed;
        }
      } catch {}
      setLoaded(true);
    })();
  }, [key]);

  const save = useCallback(async (val) => {
    const next = typeof val === "function" ? val(dataRef.current) : val;
    dataRef.current = next;
    setData(next);
    try { await window.storage.set(key, JSON.stringify(next)); } catch {}
  }, [key]);

  return [data, save, loaded];
}

// Category colors for dinner
const CAT_COLORS = {
  "South Indian": { bg: "#FFF4E6", col: "#E67E22" },
  "Gujarati": { bg: "#E8F8F0", col: "#27AE60" },
  "Street Food": { bg: "#FFF0F1", col: "#E41E3F" },
  "International": { bg: "#F3E8FF", col: "#8E44AD" },
  "Festive": { bg: "#FEF9E7", col: "#F39C12" },
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("planner");
  const [weekOffset, setWeekOffset] = useState(0);
  const [plan, savePlan] = useStorage("family-meal-plan-v1", {});
  const [feedback, saveFeedback] = useStorage("family-meal-feedback-v1", {});
  const [regularBreakfasts, saveRegularBreakfasts] = useStorage("family-regular-breakfasts-v1", INIT_REGULAR_BREAKFASTS);
  const [guestBreakfasts, saveGuestBreakfasts] = useStorage("family-guest-breakfasts-v1", INIT_GUEST_BREAKFASTS);
  const [daals, saveDaals] = useStorage("family-daals-v1", INIT_DAALS);
  const [sabjis, saveSabjis] = useStorage("family-sabjis-v1", INIT_SABJIS);
  const [dinnerCombos, saveDinnerCombos] = useStorage("family-dinner-combos-v1", INIT_DINNER_COMBOS);
  const [dinnerMains, saveDinnerMains] = useStorage("family-dinner-mains-v1", INIT_DINNER_MAINS);
  const [dinnerBases, saveDinnerBases] = useStorage("family-dinner-bases-v1", INIT_DINNER_BASES);
  const [dinnerSides, saveDinnerSides] = useStorage("family-dinner-sides-v1", INIT_DINNER_SIDES);
  const [rotis, saveRotis] = useStorage("family-rotis-v1", INIT_ROTIS);
  const [rices, saveRices] = useStorage("family-rices-v1", INIT_RICES);

  // Picker state
  const [picker, setPicker] = useState(null); // { dateKey, slot }
  const [pickerSel, setPickerSel] = useState({}); // selections in progress

  const weekDates = getWeekDates(weekOffset);
  const weekLabel = `${weekDates[0].getDate()} ${MONTH_NAMES[weekDates[0].getMonth()]} – ${weekDates[6].getDate()} ${MONTH_NAMES[weekDates[6].getMonth()]} ${weekDates[6].getFullYear()}`;

  function openPicker(dk, slot) {
    const existing = plan[dk]?.[slot] || {};
    setPickerSel(existing);
    setPicker({ dk, slot });
  }

  function closePicker() {
    setPicker(null);
    setPickerSel({});
  }

  function autoSave(newSel) {
    if (!picker) return;
    setPickerSel(newSel);
    savePlan(prev => ({
      ...prev,
      [picker.dk]: {
        ...(prev[picker.dk] || {}),
        [picker.slot]: newSel,
      },
    }));
  }

  function clearMeal(dk, slot) {
    savePlan(prev => {
      const next = { ...prev };
      if (next[dk]) {
        next[dk] = { ...next[dk] };
        delete next[dk][slot];
      }
      return next;
    });
  }

  function setFeedback(mealKey, val) {
    saveFeedback(prev => ({ ...prev, [mealKey]: prev[mealKey] === val ? null : val }));
  }

  function getFeedbackKey(dk, slot) { return `${dk}__${slot}`; }

  function hasMeal(dk, slot) {
    const m = plan[dk]?.[slot];
    if (!m) return false;
    if (slot === "breakfast") return !!(m.item || (m.items && m.items.length));
    if (slot === "lunch") return !!(m.daal || (m.daals && m.daals.length) || (m.sabjis && m.sabjis.length));
    if (slot === "dinner" || slot === "guestDinner") return !!(m.combo || (m.mains && m.mains.length));
    return false;
  }

  function getMealLabel(dk, slot) {
    const m = plan[dk]?.[slot];
    if (!m) return "";
    if (slot === "breakfast") {
      const items = m.items || (m.item ? [m.item] : []);
      return items.join(" + ");
    }
    if (slot === "lunch") {
      const parts = [];
      const daals = m.daals || (m.daal ? [m.daal] : []);
      if (daals.length) parts.push(...daals);
      if (m.sabjis) parts.push(...m.sabjis);
      if (m.rotis) parts.push(...m.rotis);
      if (m.rice) parts.push(m.rice);
      return parts.join(" + ");
    }
    if (slot === "dinner" || slot === "guestDinner") {
      if (m.combo) {
        const parts = [m.combo];
        if (m.rotis) parts.push(...m.rotis);
        if (m.rice) parts.push(m.rice);
        return parts.join(" + ");
      }
      const parts = [...(m.mains || []), ...(m.bases || []), ...(m.sides || [])];
      if (m.rotis) parts.push(...m.rotis);
      if (m.rice) parts.push(m.rice);
      return parts.join(" + ");
    }
    return "";
  }

  const slots = [
    { key: "breakfast", emoji: "🌅", label: "Breakfast" },
    { key: "lunch", emoji: "☀️", label: "Lunch" },
    { key: "dinner", emoji: "🌙", label: "Dinner" },
  ];

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
      <div style={S.app}>
        {/* Header */}
        <div style={S.header}>
          <div style={S.headerTitle}>🍽️ Family Meal Planner</div>
          <div style={S.headerSub}>Plan your week, enjoy every meal</div>
        </div>

        {/* Bottom Nav */}
        <div style={S.bottomNav}>
          {[
            { key: "planner", emoji: "📅", label: "Planner" },
            { key: "meals", emoji: "🍛", label: "Meals" },
            { key: "manage", emoji: "⚙️", label: "Manage" },
          ].map(n => (
            <button key={n.key} style={{ ...S.navItem, ...(tab === n.key ? S.navItemActive : {}) }} onClick={() => setTab(n.key)}>
              <span style={{ fontSize: 20 }}>{n.emoji}</span>
              {n.label}
            </button>
          ))}
        </div>

        {/* ── PLANNER TAB ── */}
        {tab === "planner" && (
          <>
            <div style={S.weekNav}>
              <button style={S.navBtn} onClick={() => setWeekOffset(o => o - 1)}>‹</button>
              <div style={{ textAlign: "center" }}>
                <div style={S.weekLabel}>{weekLabel}</div>
                {weekOffset !== 0 && (
                  <button style={{ ...S.todayBtn, marginTop: 3 }} onClick={() => setWeekOffset(0)}>This Week</button>
                )}
              </div>
              <button style={S.navBtn} onClick={() => setWeekOffset(o => o + 1)}>›</button>
            </div>

            {weekDates.map((d, dayIdx) => {
              const dk = dateKey(d);
              const today = isToday(d);
              const dc = DAY_COLORS[dayIdx % 7];
              return (
                <div key={dk} style={{ ...S.dayCard, border: `2.5px solid ${dc.border}`, background: dc.light, ...(today ? { boxShadow: `0 4px 18px ${dc.border}55` } : {}) }}>
                  <div style={{ ...S.dayHeader, background: dc.header }}>
                    <div>
                      <span style={S.dayName}>{DAY_NAMES[d.getDay()]}</span>
                      <span style={S.dayDate}>{d.getDate()} {MONTH_NAMES[d.getMonth()]}</span>
                    </div>
                    {today && <span style={S.todayBadge}>TODAY</span>}
                  </div>

                  {slots.map(sl => {
                    const has = hasMeal(dk, sl.key);
                    const label = getMealLabel(dk, sl.key);
                    const fbKey = getFeedbackKey(dk, sl.key);
                    const fb = feedback[fbKey];
                    const m = plan[dk]?.[sl.key];

                    // Dislike warning
                    let warned = false;
                    if (has && m) {
                      const checkNames = [];
                      if (sl.key === "breakfast" && m.item) checkNames.push(m.item);
                      if (sl.key === "lunch") { if (m.daal) checkNames.push(m.daal); if (m.sabjis) checkNames.push(...m.sabjis); }
                      if (sl.key === "dinner") { if (m.combo) checkNames.push(m.combo); if (m.mains) checkNames.push(...m.mains); }
                      warned = checkNames.some(n => feedback[`dislike__${n}`] === true);
                    }

                    return (
                      <div key={sl.key} style={{ ...S.slotRow, background: "#fff" }}>
                        <div style={S.slotLabel}>
                          <span>{sl.emoji}</span> {sl.label}
                          {warned && <span style={S.warnBadge}>⚠️ Family didn't enjoy this before</span>}
                        </div>
                        {!has ? (
                          <button style={S.addBtn} onClick={() => openPicker(dk, sl.key)}>
                            + Add {sl.label}
                          </button>
                        ) : (
                          <div>
                            <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 2 }}>
                              {label.split(" + ").map((part, i) => (
                                <span key={i} style={S.mealTag}>{part}</span>
                              ))}
                              <button style={{ ...S.mealTag, background: "#F0F2F5", fontSize: 11, color: "#65676B" }}
                                onClick={() => openPicker(dk, sl.key)}>✏️</button>
                              <button style={{ ...S.mealTag, background: "#FFF0F1", fontSize: 11, color: "#E41E3F" }}
                                onClick={() => clearMeal(dk, sl.key)}>✕</button>
                            </div>
                            <div style={S.feedbackRow}>
                              <button style={{ ...S.fbBtn, ...(fb === "liked" ? S.fbBtnActive : {}) }}
                                onClick={() => setFeedback(fbKey, "liked")}>👍</button>
                              <button style={{ ...S.fbBtn, ...(fb === "disliked" ? { background: "#FFF0F1", borderColor: "#E41E3F" } : {}) }}
                                onClick={() => {
                                  setFeedback(fbKey, "disliked");
                                  if (m) {
                                    const names = [];
                                    if (sl.key === "breakfast" && m.item) names.push(m.item);
                                    if (sl.key === "lunch") { if (m.daal) names.push(m.daal); if (m.sabjis) names.push(...m.sabjis); }
                                    if (sl.key === "dinner") { if (m.combo) names.push(m.combo); if (m.mains) names.push(...m.mains); }
                                    const upd = { ...feedback, [fbKey]: "disliked" };
                                    names.forEach(n => { upd[`dislike__${n}`] = true; });
                                    saveFeedback(upd);
                                  }
                                }}>👎</button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}

                  {/* ── GUEST DINNER SLOT (4th, hidden unless added) ── */}
                  {(() => {
                    const hasGD = hasMeal(dk, "guestDinner");
                    const gdLabel = getMealLabel(dk, "guestDinner");
                    const gdFbKey = getFeedbackKey(dk, "guestDinner");
                    const gdFb = feedback[gdFbKey];
                    return (
                      <div style={{ ...S.slotRow, background: "#FFF8EE", borderTop: "2px dashed #F7971E" }}>
                        <div style={{ ...S.slotLabel, color: "#F7971E" }}>
                          <span>👥</span> Guest Dinner
                        </div>
                        {!hasGD ? (
                          <button style={{ ...S.addBtn, background: "#FFF3E0", borderColor: "#F7971E", color: "#F7971E" }}
                            onClick={() => openPicker(dk, "guestDinner")}>
                            + Add Guest Dinner
                          </button>
                        ) : (
                          <div>
                            <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 2 }}>
                              {gdLabel.split(" + ").map((part, i) => (
                                <span key={i} style={{ ...S.mealTag, background: "#FFF3E0", borderColor: "#F7971E", color: "#E65100" }}>{part}</span>
                              ))}
                              <button style={{ ...S.mealTag, background: "#F0F2F5", fontSize: 11, color: "#65676B" }}
                                onClick={() => openPicker(dk, "guestDinner")}>✏️</button>
                              <button style={{ ...S.mealTag, background: "#FFF0F1", fontSize: 11, color: "#E41E3F" }}
                                onClick={() => clearMeal(dk, "guestDinner")}>✕</button>
                            </div>
                            <div style={S.feedbackRow}>
                              <button style={{ ...S.fbBtn, ...(gdFb === "liked" ? S.fbBtnActive : {}) }}
                                onClick={() => setFeedback(gdFbKey, "liked")}>👍</button>
                              <button style={{ ...S.fbBtn, ...(gdFb === "disliked" ? { background: "#FFF0F1", borderColor: "#E41E3F" } : {}) }}
                                onClick={() => setFeedback(gdFbKey, "disliked")}>👎</button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })()}
                </div>
              );
            })}
          </>
        )}

        {/* ── MEALS BROWSE TAB ── */}
        {tab === "meals" && (
          <MealsBrowse
            regularBreakfasts={regularBreakfasts} guestBreakfasts={guestBreakfasts}
            daals={daals} sabjis={sabjis}
            dinnerCombos={dinnerCombos} dinnerMains={dinnerMains}
            dinnerBases={dinnerBases} dinnerSides={dinnerSides}
            feedback={feedback}
          />
        )}

        {/* ── MANAGE TAB ── */}
        {tab === "manage" && (
          <ManageTab
            regularBreakfasts={regularBreakfasts} saveRegularBreakfasts={saveRegularBreakfasts}
            guestBreakfasts={guestBreakfasts} saveGuestBreakfasts={saveGuestBreakfasts}
            daals={daals} saveDaals={saveDaals}
            sabjis={sabjis} saveSabjis={saveSabjis}
            dinnerCombos={dinnerCombos} saveDinnerCombos={saveDinnerCombos}
            dinnerMains={dinnerMains} saveDinnerMains={saveDinnerMains}
            dinnerBases={dinnerBases} saveDinnerBases={saveDinnerBases}
            dinnerSides={dinnerSides} saveDinnerSides={saveDinnerSides}
            rotis={rotis} saveRotis={saveRotis}
            rices={rices} saveRices={saveRices}
            plan={plan} savePlan={savePlan}
            feedback={feedback} saveFeedback={saveFeedback}
          />
        )}

        {/* ── PICKER MODAL ── */}
        {picker && (
          <div style={S.modal} onClick={e => { if (e.target === e.currentTarget) closePicker(); }}>
            <div style={S.modalBox}>
              <div style={S.modalHeader}>
                <div style={S.modalTitle}>
                  {picker.slot === "breakfast" ? "🌅 Choose Breakfast"
                    : picker.slot === "lunch" ? "☀️ Choose Lunch"
                    : picker.slot === "guestDinner" ? "👥 Choose Guest Dinner"
                    : "🌙 Choose Dinner"}
                </div>
                <button style={S.modalClose} onClick={closePicker}>✕</button>
              </div>

              {picker.slot === "breakfast" && (
                <BreakfastPicker regularItems={regularBreakfasts} guestItems={guestBreakfasts} sel={pickerSel} setSel={autoSave} feedback={feedback} />
              )}
              {picker.slot === "lunch" && (

                <DinnerPicker combos={dinnerCombos} mains={dinnerMains} bases={dinnerBases} sides={dinnerSides}

// ─── LUNCH PICKER ─────────────────────────────────────────────────────────────

      ? selDaals.filter(d => d !== name)
      : [...selDaals, name];
    setSel({ ...sel, daals: newDaals, daal: undefined });
  }

  function toggleSabji(name) {
    const newSabjis = selSabjis.includes(name)
      ? selSabjis.filter(s => s !== name)
      : selSabjis.length < 3 ? [...selSabjis, name] : selSabjis;

  function toggleRoti(name) {
    const newRotis = selRotis.includes(name)

    setSel({ ...sel, rotis: newRotis });
  }

// ─── MANAGE TAB ───────────────────────────────────────────────────────────────
function ManageTab({ regularBreakfasts, saveRegularBreakfasts, guestBreakfasts, saveGuestBreakfasts, daals, saveDaals, sabjis, saveSabjis, dinnerCombos, saveDinnerCombos, dinnerMains, saveDinnerMains, dinnerBases, saveDinnerBases, dinnerSides, saveDinnerSides, rotis, saveRotis, rices, saveRices, plan, savePlan, feedback, saveFeedback }) {
  const [section, setSection] = useState("backup");
  const [editItem, setEditItem] = useState(null);
  const [addMode, setAddMode] = useState(false);
  const [form, setForm] = useState({ name: "", recipe: "", link: "", category: "Green" });
  const [restoreMsg, setRestoreMsg] = useState("");

  function doBackup() {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      regularBreakfasts, guestBreakfasts, daals, sabjis,
      dinnerCombos, dinnerMains, dinnerBases, dinnerSides,
      rotis, rices, plan, feedback,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `meal-planner-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function doRestore(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.version !== 1) { setRestoreMsg("❌ Invalid backup file."); return; }
        if (data.regularBreakfasts) saveRegularBreakfasts(data.regularBreakfasts);
        if (data.guestBreakfasts) saveGuestBreakfasts(data.guestBreakfasts);
        if (data.daals) saveDaals(data.daals);
        if (data.sabjis) saveSabjis(data.sabjis);
        if (data.dinnerCombos) saveDinnerCombos(data.dinnerCombos);
        if (data.dinnerMains) saveDinnerMains(data.dinnerMains);
        if (data.dinnerBases) saveDinnerBases(data.dinnerBases);
        if (data.dinnerSides) saveDinnerSides(data.dinnerSides);
        if (data.rotis) saveRotis(data.rotis);
        if (data.rices) saveRices(data.rices);
        if (data.plan) savePlan(data.plan);
        if (data.feedback) saveFeedback(data.feedback);
        setRestoreMsg("✅ Restored successfully! All your data is back.");
      } catch { setRestoreMsg("❌ Could not read file. Please try again."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  const sections = [
    { key: "backup", label: "💾 Backup" },
    { key: "regular-breakfast", label: "🌅 Regular Breakfast" },
    { key: "guest-breakfast", label: "👥 Guest Breakfast" },
    { key: "daals", label: "🥣 Daals" },
    { key: "sabjis", label: "🥬 Sabjis" },
    { key: "rotis", label: "🫓 Roti" },
    { key: "rices", label: "🍚 Rice" },
    { key: "dinner-combos", label: "📦 Dinner Combos" },
    { key: "dinner-mains", label: "🍽️ Dinner Mains" },
    { key: "dinner-bases", label: "🍚 Dinner Bases" },
    { key: "dinner-sides", label: "🥗 Dinner Sides" },
  ];

  function getList() {
    if (section === "regular-breakfast") return regularBreakfasts;
    if (section === "guest-breakfast") return guestBreakfasts;
    if (section === "daals") return daals;
    if (section === "sabjis") return sabjis;
    if (section === "rotis") return rotis;
    if (section === "rices") return rices;
    if (section === "dinner-combos") return dinnerCombos;
    if (section === "dinner-mains") return dinnerMains;
    if (section === "dinner-bases") return dinnerBases;
    if (section === "dinner-sides") return dinnerSides;
    return [];
  }

  function getSave() {
    if (section === "regular-breakfast") return saveRegularBreakfasts;
    if (section === "guest-breakfast") return saveGuestBreakfasts;
    if (section === "daals") return saveDaals;
    if (section === "sabjis") return saveSabjis;
    if (section === "rotis") return saveRotis;
    if (section === "rices") return saveRices;
    if (section === "dinner-combos") return saveDinnerCombos;
    if (section === "dinner-mains") return saveDinnerMains;
    if (section === "dinner-bases") return saveDinnerBases;
    if (section === "dinner-sides") return saveDinnerSides;
    return () => {};
  }

  function deleteItem(id) {
    const updated = getList().filter(x => x.id !== id);
    getSave()(updated);
  }

  function startEdit(item) {
    setEditItem(item);
    setForm({ name: item.name, recipe: item.recipe || "", link: item.link || "", category: item.category || "Green" });
    setAddMode(false);
  }

  function startAdd() {
    setEditItem(null);
    setForm({ name: "", recipe: "", link: "", category: "Green" });
    setAddMode(true);
  }

  function saveEdit() {
    if (!form.name.trim()) return;
    const currentList = getList();
    if (addMode) {
      const newId = section + "_" + Date.now();
      const newItem = { id: newId, ...form };
      const updated = [...currentList, newItem].sort((a, b) => a.name.localeCompare(b.name));
      getSave()(updated);
    } else {
      const updated = currentList
        .map(x => x.id === editItem.id ? { ...x, ...form } : x)
        .sort((a, b) => a.name.localeCompare(b.name));
      getSave()(updated);
    }
    setEditItem(null);
    setAddMode(false);
  }

  const showingEdit = editItem || addMode;

  return (
    <div>
      <div style={{ display: "flex", gap: 6, padding: "10px 12px", overflowX: "auto", borderBottom: "1px solid #E4E6EB" }}>
        {sections.map(s => (
          <button key={s.key} onClick={() => { setSection(s.key); setEditItem(null); setAddMode(false); }} style={{
            whiteSpace: "nowrap", border: "none", borderRadius: 16, padding: "6px 12px",
            fontSize: 11, fontWeight: 700, cursor: "pointer",
            background: section === s.key ? "#1877F2" : "#F0F2F5",
            color: section === s.key ? "#fff" : "#65676B",
            fontFamily: "'Nunito', sans-serif",
          }}>{s.label}</button>
        ))}
      </div>

      {/* ── BACKUP SECTION ── */}
      {section === "backup" && (
        <div style={{ padding: 20 }}>
          <div style={{ fontWeight: 800, fontSize: 16, color: "#1C1E21", marginBottom: 6 }}>💾 Backup & Restore</div>
          <div style={{ fontSize: 13, color: "#65676B", marginBottom: 20, lineHeight: 1.5 }}>
            Save all your meals, plans and recipes to a file on your device. If data is ever lost, restore it in one tap.
          </div>

          {/* Backup */}
          <div style={{ background: "#E7F3FF", borderRadius: 14, padding: 16, marginBottom: 14 }}>
            <div style={{ fontWeight: 800, fontSize: 15, color: "#1877F2", marginBottom: 6 }}>📤 Backup</div>
            <div style={{ fontSize: 13, color: "#42599A", marginBottom: 12 }}>Downloads a backup file to your Mac / phone. Do this once a week.</div>
            <button onClick={doBackup} style={{ background: "#1877F2", color: "#fff", border: "none", borderRadius: 12, padding: "12px 20px", fontSize: 15, fontWeight: 800, cursor: "pointer", width: "100%" }}>
              💾 Download Backup File
            </button>
          </div>

          {/* Restore */}
          <div style={{ background: "#E8F8F0", borderRadius: 14, padding: 16, marginBottom: 14 }}>
            <div style={{ fontWeight: 800, fontSize: 15, color: "#27AE60", marginBottom: 6 }}>📥 Restore</div>
            <div style={{ fontSize: 13, color: "#1E8449", marginBottom: 12 }}>Pick your backup file to restore all your data instantly.</div>
            <label style={{ background: "#27AE60", color: "#fff", border: "none", borderRadius: 12, padding: "12px 20px", fontSize: 15, fontWeight: 800, cursor: "pointer", width: "100%", display: "block", textAlign: "center", boxSizing: "border-box" }}>
              📂 Choose Backup File
              <input type="file" accept=".json" onChange={doRestore} style={{ display: "none" }} />
            </label>
          </div>

          {restoreMsg && (
            <div style={{ background: restoreMsg.startsWith("✅") ? "#E8F8F0" : "#FFF0F1", borderRadius: 10, padding: "12px 16px", fontSize: 14, fontWeight: 700, color: restoreMsg.startsWith("✅") ? "#27AE60" : "#E41E3F" }}>
              {restoreMsg}
            </div>
          )}

          <div style={{ marginTop: 20, background: "#FFF8EE", borderRadius: 12, padding: 14 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "#E67E22", marginBottom: 4 }}>💡 Tip</div>
            <div style={{ fontSize: 12, color: "#784212", lineHeight: 1.5 }}>
              Back up once a week — takes 2 seconds. Save the file to your Google Drive or WhatsApp it to yourself so you always have it.
            </div>
          </div>
        </div>
      )}

      {section !== "backup" && (showingEdit ? (
        <div style={{ padding: 16 }}>
          <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 14, color: "#1C1E21" }}>
            {addMode ? "➕ Add New" : "✏️ Edit"}
          </div>
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#65676B", marginBottom: 4 }}>Name *</div>
            <input style={S.input} value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Enter name..." />
          </div>
          {section === "sabjis" && (
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#65676B", marginBottom: 4 }}>Category</div>
              <div style={{ display: "flex", gap: 8 }}>
                {["Marwari", "Punjabi", "Green"].map(c => (
                  <button key={c} onClick={() => setForm(f => ({ ...f, category: c }))} style={{
                    border: "none", borderRadius: 10, padding: "6px 14px", cursor: "pointer",
                    fontWeight: 700, fontSize: 13, fontFamily: "'Nunito', sans-serif",
                    background: form.category === c ? "#1877F2" : "#F0F2F5",
                    color: form.category === c ? "#fff" : "#65676B",
                  }}>{c}</button>
                ))}
              </div>
            </div>
          )}
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#65676B", marginBottom: 4 }}>🔗 Recipe Link (YouTube / Instagram)</div>
            <input style={S.input} value={form.link} onChange={e => setForm(f => ({ ...f, link: e.target.value }))} placeholder="Paste link..." />
          </div>
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#65676B", marginBottom: 4 }}>📝 Recipe (type here)</div>
            <textarea style={S.textarea} value={form.recipe} onChange={e => setForm(f => ({ ...f, recipe: e.target.value }))} placeholder="Type recipe steps..." />
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button style={{ ...S.doneBtn, margin: 0, flex: 1 }} onClick={saveEdit}>💾 Save</button>
            <button style={{ flex: 1, background: "#F0F2F5", color: "#65676B", border: "none", borderRadius: 12, padding: 12, fontSize: 14, fontWeight: 700, cursor: "pointer" }}
              onClick={() => { setEditItem(null); setAddMode(false); }}>Cancel</button>
          </div>
        </div>
      ) : (
        <div style={{ padding: "8px 14px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontWeight: 800, fontSize: 13, color: "#1C1E21" }}>{sections.find(s => s.key === section)?.label} — {getList().length} items</div>
            <button style={S.addNewBtn} onClick={startAdd}>+ Add New</button>
          </div>
          {alpha(getList()).map(item => (
            <div key={item.id} style={S.manageItem}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 13, color: "#1C1E21" }}>{item.name}</div>
                {item.category && <div style={{ fontSize: 11, color: "#65676B" }}>{item.category}</div>}
                {item.recipe && <div style={{ fontSize: 11, color: "#27AE60" }}>📝 Has recipe</div>}
                {item.link && <div style={{ fontSize: 11, color: "#1877F2" }}>📹 Has video</div>}
                {item.components && <div style={{ fontSize: 11, color: "#65676B" }}>{item.components.join(", ")}</div>}
              </div>
              <div style={{ display: "flex", gap: 4 }}>
                <button style={S.editBtn} onClick={() => startEdit(item)}>Edit</button>
                <button style={S.deleteBtn} onClick={() => deleteItem(item.id)}>Del</button>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
